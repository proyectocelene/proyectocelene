<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Celene</title>
    
    <style>
        /* Importación de la fuente Archivo solicitada */
        @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            font-family: "Archivo", sans-serif;
            font-optical-sizing: auto;
            font-variation-settings: "wdth" 100;
        }

        /* Utilidad para que los números sean más legibles y se alineen bien (monoespaciados) */
        .numeros-claros {
            font-variant-numeric: tabular-nums;
        }

        /* Estilos estrictos para impresión para EVITAR salto de página */
        @media print {
            html, body { 
                background-color: white !important; 
                color: black !important; 
                margin: 0 !important;
                padding: 0 !important;
            }
            /* Forzar orientación vertical, márgenes mínimos */
            @page { 
                size: letter portrait; 
                margin: 0.2in; 
            }
            .print-hide { display: none !important; }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            /* Contenedor principal de impresión fijado al alto de la hoja */
            .hoja-impresion {
                height: 10.4in !important; 
                max-height: 10.4in !important;
                overflow: hidden !important;
            }
        }
        
        /* Para que la tabla no desborde sus contenedores pero permita saltos de línea */
        table { table-layout: fixed; width: 100%; }
        th, td { word-wrap: break-word; white-space: normal; }
    </style>

    <!-- Librerías de diseño y React -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONOS ---
        const Icon = ({ path, className = "w-5 h-5" }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }}></svg>
        );
        const IcoReceipt = () => <Icon path='<path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/>' />;
        const IcoList = () => <Icon path='<line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line>' className="w-4 h-4"/>;
        const IcoSettings = () => <Icon path='<circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>' className="w-4 h-4"/>;
        const IcoUser = () => <Icon path='<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>' className="w-4 h-4"/>;
        const IcoFileText = () => <Icon path='<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline>' className="w-4 h-4"/>;
        const IcoPlus = () => <Icon path='<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>' className="w-3 h-3"/>;
        const IcoSearch = () => <Icon path='<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>' className="w-4 h-4"/>;
        const IcoTrash = () => <Icon path='<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>' className="w-4 h-4"/>;
        const IcoDownload = () => <Icon path='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>' className="w-4 h-4"/>;
        const IcoPrinter = () => <Icon path='<polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect>' className="w-5 h-5"/>;
        const IcoX = () => <Icon path='<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>' className="w-5 h-5"/>;
        const IcoEdit = () => <Icon path='<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>' className="w-4 h-4"/>;

        // --- CATALOGO POR DEFECTO ---
        const CATALOGO_DEFAULT = [
          { id: 1, categoria: "Consultas y Valoraciones", nombre: "Orientación Médica", rangoComercial: "$300 - $500", valorComercial: 400, textoCuota: "GRATIS", valorCuota: 0 },
          { id: 2, categoria: "Consultas y Valoraciones", nombre: "Consulta Médica General", rangoComercial: "$500 - $800", valorComercial: 650, textoCuota: "$150", valorCuota: 150 },
          { id: 3, categoria: "Consultas y Valoraciones", nombre: "Consulta Virtual", rangoComercial: "$500 - $800", valorComercial: 650, textoCuota: "$150", valorCuota: 150 },
          { id: 4, categoria: "Consultas y Valoraciones", nombre: "Certificado Médico", rangoComercial: "$300 - $500", valorComercial: 400, textoCuota: "$150", valorCuota: 150 },
          { id: 5, categoria: "Salud Femenina, Reproductiva e ITS", nombre: "Mastografía (Vale)", rangoComercial: "$800 - $1,500", valorComercial: 1150, textoCuota: "GRATIS", valorCuota: 0 },
          { id: 6, categoria: "Salud Femenina, Reproductiva e ITS", nombre: "Prueba Rápida de VIH", rangoComercial: "$300 - $600", valorComercial: 450, textoCuota: "GRATIS", valorCuota: 0 },
          { id: 7, categoria: "Salud Femenina, Reproductiva e ITS", nombre: "Papanicolaou", rangoComercial: "$600 - $1,000", valorComercial: 800, textoCuota: "$150", valorCuota: 150 },
          { id: 8, categoria: "Salud Femenina, Reproductiva e ITS", nombre: "Prueba de Embarazo en Sangre", rangoComercial: "$300 - $500", valorComercial: 400, textoCuota: "$50", valorCuota: 50 },
          { id: 9, categoria: "Salud Femenina, Reproductiva e ITS", nombre: "Panel ITS Completo", rangoComercial: "$1,500 - $3,000", valorComercial: 2250, textoCuota: "$600", valorCuota: 600 },
          { id: 10, categoria: "Salud Femenina, Reproductiva e ITS", nombre: "Implante Subdérmico (Coloc/Retiro)", rangoComercial: "$1,500 - $3,000", valorComercial: 2250, textoCuota: "$400", valorCuota: 400 },
          { id: 11, categoria: "Salud Femenina, Reproductiva e ITS", nombre: "DIU (Colocación/Retiro)", rangoComercial: "$1,500 - $2,500", valorComercial: 2000, textoCuota: "$450", valorCuota: 450 },
          { id: 12, categoria: "Laboratorios y Monitoreo", nombre: "Hemoglobina Glucosilada (HbA1c)", rangoComercial: "$400 - $700", valorComercial: 550, textoCuota: "$150", valorCuota: 150 },
          { id: 13, categoria: "Laboratorios y Monitoreo", nombre: "Antígeno Prostático (PSA)", rangoComercial: "$400 - $800", valorComercial: 600, textoCuota: "$150", valorCuota: 150 },
          { id: 14, categoria: "Laboratorios y Monitoreo", nombre: "Prueba Rápida COVID-19", rangoComercial: "$400 - $800", valorComercial: 600, textoCuota: "$150", valorCuota: 150 },
          { id: 15, categoria: "Laboratorios y Monitoreo", nombre: "Toma de Glucosa Capilar", rangoComercial: "$100 - $200", valorComercial: 150, textoCuota: "$30", valorCuota: 30 },
          { id: 16, categoria: "Laboratorios y Monitoreo", nombre: "Toma de Presión / Peso y Talla", rangoComercial: "$50 - $100", valorComercial: 75, textoCuota: "$15", valorCuota: 15 },
          { id: 17, categoria: "Procedimientos Menores y Clínica del Dolor", nombre: "Inyección de Puntos Gatillo (TPI)", rangoComercial: "$800 - $1,500", valorComercial: 1150, textoCuota: "$300", valorCuota: 300 },
          { id: 18, categoria: "Procedimientos Menores y Clínica del Dolor", nombre: "Curación de Heridas", rangoComercial: "$500 - $1,000", valorComercial: 750, textoCuota: "$250", valorCuota: 250 },
          { id: 19, categoria: "Procedimientos Menores y Clínica del Dolor", nombre: "Sutura", rangoComercial: "$1,000 - $2,500", valorComercial: 1750, textoCuota: "$350", valorCuota: 350 },
          { id: 20, categoria: "Procedimientos Menores y Clínica del Dolor", nombre: "Lavado de Oídos", rangoComercial: "$500 - $900", valorComercial: 700, textoCuota: "$250", valorCuota: 250 },
          { id: 21, categoria: "Procedimientos Menores y Clínica del Dolor", nombre: "Drenaje de Absceso", rangoComercial: "$1,000 - $2,500", valorComercial: 1750, textoCuota: "$400", valorCuota: 400 },
          { id: 22, categoria: "Procedimientos Menores y Clínica del Dolor", nombre: "Retiro de Verrugas", rangoComercial: "$800 - $2,000", valorComercial: 1400, textoCuota: "$350", valorCuota: 350 },
          { id: 23, categoria: "Procedimientos Menores y Clínica del Dolor", nombre: "Retiro de Suturas", rangoComercial: "$300 - $600", valorComercial: 450, textoCuota: "$150", valorCuota: 150 },
          { id: 24, categoria: "Procedimientos Menores y Clínica del Dolor", nombre: "Aplicación de Inyecciones", rangoComercial: "$100 - $200", valorComercial: 150, textoCuota: "$40", valorCuota: 40 }
        ];

        // --- APLICACIÓN PRINCIPAL ---
        const App = () => {
          const [history, setHistory] = useState([]);
          const [nextFolio, setNextFolio] = useState(1);
          const [catalogo, setCatalogo] = useState(CATALOGO_DEFAULT);
          const [pacientesDB, setPacientesDB] = useState([]);
          
          const [editingFolio, setEditingFolio] = useState(null);
          const [doctor, setDoctor] = useState('Dr Carlos Donato');
          const [paciente, setPaciente] = useState({ nombre: '', edad: '', sexo: '', domicilio: '', telefono: '' });
          const [serviciosSeleccionados, setServiciosSeleccionados] = useState([]);
          const [aporteSolidario, setAporteSolidario] = useState('');
          const [formaPago, setFormaPago] = useState('');
          const [comentarios, setComentarios] = useState('');
          
          const [searchTerm, setSearchTerm] = useState('');
          const [showHistoryModal, setShowHistoryModal] = useState(false);
          const [showCatalogModal, setShowCatalogModal] = useState(false);
          const [showManualService, setShowManualService] = useState(false);
          const [showPacienteDropdown, setShowPacienteDropdown] = useState(false);

          const [nuevoServicioCat, setNuevoServicioCat] = useState({ categoria: 'General', nombre: '', rangoComercial: '', valorComercial: '', textoCuota: '', valorCuota: '' });

          useEffect(() => {
            const savedReceipts = localStorage.getItem('celene_receipts');
            if (savedReceipts) {
              const parsed = JSON.parse(savedReceipts);
              setHistory(parsed);
              if (parsed.length > 0) {
                const maxFolio = Math.max(...parsed.map(r => r.folio));
                setNextFolio(maxFolio + 1);
              }
            }
            const savedCatalog = localStorage.getItem('celene_catalog');
            if (savedCatalog) {
              setCatalogo(JSON.parse(savedCatalog));
            } else {
              localStorage.setItem('celene_catalog', JSON.stringify(CATALOGO_DEFAULT));
            }
            const savedPacientes = localStorage.getItem('celene_pacientes');
            if (savedPacientes) {
              setPacientesDB(JSON.parse(savedPacientes));
            }
          }, []);

          // CALCULO DE TOTALES E INTELIGENCIA DE SUBSIDIOS Y AHORROS
          const totales = useMemo(() => {
            let comercial = 0; 
            let cuotaBaseTotal = 0; 
            let cuotaACobrar = 0;   

            serviciosSeleccionados.forEach(s => { 
                comercial += Number(s.valorComercial) || 0; 
                cuotaBaseTotal += Number(s.valorCuota) || 0; 
                
                // Si NO está subsidiado, se suma al cobro
                if (!s.isSubsidized) {
                    cuotaACobrar += Number(s.valorCuota) || 0; 
                }
            });

            const aporte = aporteSolidario !== '' ? parseFloat(aporteSolidario) : null;
            
            // Adeudado sobre lo que se debía cobrar
            const adeudado = aporte !== null ? Math.max(0, cuotaACobrar - aporte) : null;
            
            // Ahorro Base (Lo que te ahorras por estar en Celene vs Privado)
            const ahorroBase = comercial - cuotaBaseTotal;

            // Subsidio Otorgado Directo (Lo que se exentó / perdonó hoy específicamente)
            const subsidioOtorgado = cuotaBaseTotal - cuotaACobrar;

            // Ahorro Total Final del Paciente
            const ahorroTotalReal = aporte !== null ? (comercial - aporte) : (comercial - cuotaACobrar);
            
            return { comercial, cuotaBaseTotal, cuotaACobrar, subsidioOtorgado, aporte, adeudado, ahorroBase, ahorroTotalReal };
          }, [serviciosSeleccionados, aporteSolidario]);

          const serviciosFiltrados = useMemo(() => {
            if (!searchTerm) return catalogo;
            const lower = searchTerm.toLowerCase();
            return catalogo.filter(s => s.nombre.toLowerCase().includes(lower) || s.categoria.toLowerCase().includes(lower));
          }, [catalogo, searchTerm]);

          // Autocompletado de pacientes
          const pacientesFiltrados = useMemo(() => {
            if (!paciente.nombre || paciente.nombre.length < 2) return [];
            return pacientesDB.filter(p => p.nombre.toLowerCase().includes(paciente.nombre.toLowerCase()));
          }, [paciente.nombre, pacientesDB]);

          // FUNCIÓN INTELIGENTE PARA AGREGAR SERVICIOS
          const handleAddServiceFromCatalog = (servicio) => { 
            const newUid = Date.now();
            let addedServices = [{ ...servicio, uid: newUid, isSubsidized: false }];
            
            // Lógica para auto-agregar paquete de consulta
            if (servicio.nombre === "Consulta Médica General" || servicio.nombre === "Orientación Médica") {
                const glucosa = catalogo.find(s => s.nombre === "Toma de Glucosa Capilar");
                const presion = catalogo.find(s => s.nombre === "Toma de Presión / Peso y Talla");
                
                if(glucosa) addedServices.push({...glucosa, uid: newUid + 1, isSubsidized: true});
                if(presion) addedServices.push({...presion, uid: newUid + 2, isSubsidized: true});
            }

            setServiciosSeleccionados(prev => [...prev, ...addedServices]); 
            setSearchTerm(''); 
          };
          
          const handleAddManualService = (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            const servicioParaCatalogo = {
                id: Date.now(),
                categoria: 'Agregado Manualmente',
                nombre: formData.get('nombre'),
                rangoComercial: formData.get('rangoComercial') || 'N/A',
                valorComercial: Number(formData.get('valorComercial')),
                textoCuota: formData.get('textoCuota') || `$${formData.get('valorCuota')}`,
                valorCuota: Number(formData.get('valorCuota'))
            };

            // 1. Guardar permanentemente en el catálogo
            const nuevoCatalogo = [...catalogo, servicioParaCatalogo];
            setCatalogo(nuevoCatalogo);
            localStorage.setItem('celene_catalog', JSON.stringify(nuevoCatalogo));

            // 2. Agregar al recibo actual
            const nuevoS = { ...servicioParaCatalogo, uid: Date.now(), isSubsidized: false };
            setServiciosSeleccionados([...serviciosSeleccionados, nuevoS]);
            setShowManualService(false);
          };

          const handleRemoveService = (uid) => setServiciosSeleccionados(serviciosSeleccionados.filter(s => s.uid !== uid));

          const toggleSubsidized = (uid) => {
            setServiciosSeleccionados(serviciosSeleccionados.map(s => 
                s.uid === uid ? { ...s, isSubsidized: !s.isSubsidized } : s
            ));
          };

          const limpiarFormulario = () => {
            setPaciente({ nombre: '', edad: '', sexo: '', domicilio: '', telefono: '' });
            setServiciosSeleccionados([]); 
            setAporteSolidario(''); 
            setFormaPago(''); 
            setComentarios(''); 
            setDoctor('Dr Carlos Donato'); // Resetear al predeterminado
            setEditingFolio(null);
          };

          const handleGuardarEImprimir = () => {
            if (serviciosSeleccionados.length === 0) return alert("Por favor agrega al menos un servicio.");
            const fechaActual = new Date().toLocaleString('es-MX', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            const reciboData = { folio: editingFolio || nextFolio, fecha: editingFolio ? history.find(r => r.folio === editingFolio).fecha : fechaActual, ultimaModificacion: fechaActual, doctor, paciente, servicios: serviciosSeleccionados, totales, formaPago, comentarios };
            
            // Guardar Historial Recibos
            let nuevoHistorial;
            if (editingFolio) { nuevoHistorial = history.map(r => r.folio === editingFolio ? reciboData : r); } 
            else { nuevoHistorial = [...history, reciboData]; setNextFolio(nextFolio + 1); }
            
            setHistory(nuevoHistorial);
            localStorage.setItem('celene_receipts', JSON.stringify(nuevoHistorial));

            // Auto-guardar/Actualizar Paciente en Base de Datos
            if (paciente.nombre.trim() !== '') {
                const existingPatientIndex = pacientesDB.findIndex(p => p.nombre.toLowerCase() === paciente.nombre.toLowerCase());
                let newPacientesDB = [...pacientesDB];
                if (existingPatientIndex >= 0) {
                    newPacientesDB[existingPatientIndex] = paciente; // Actualiza
                } else {
                    newPacientesDB.push(paciente); // Agrega
                }
                setPacientesDB(newPacientesDB);
                localStorage.setItem('celene_pacientes', JSON.stringify(newPacientesDB));
            }

            setTimeout(() => { window.print(); limpiarFormulario(); }, 500);
          };

          const editarReciboViejo = (recibo) => {
            setEditingFolio(recibo.folio); setDoctor(recibo.doctor || ''); setPaciente(recibo.paciente); setServiciosSeleccionados(recibo.servicios);
            setAporteSolidario(recibo.totales.aporte !== null ? recibo.totales.aporte : ''); setFormaPago(recibo.formaPago || ''); setComentarios(recibo.comentarios || ''); setShowHistoryModal(false);
          };

          const eliminarRecibo = (folio) => {
            if(window.confirm(`¿Estás seguro de eliminar el recibo #${folio}?`)) {
              const nuevoH = history.filter(r => r.folio !== folio);
              setHistory(nuevoH); localStorage.setItem('celene_receipts', JSON.stringify(nuevoH));
            }
          };

          const guardarNuevoServicioCatalogo = (e) => {
            e.preventDefault();
            const nuevo = { ...nuevoServicioCat, id: Date.now(), valorComercial: Number(nuevoServicioCat.valorComercial), valorCuota: Number(nuevoServicioCat.valorCuota) };
            const nuevoCat = [...catalogo, nuevo];
            setCatalogo(nuevoCat); localStorage.setItem('celene_catalog', JSON.stringify(nuevoCat));
            setNuevoServicioCat({ categoria: 'General', nombre: '', rangoComercial: '', valorComercial: '', textoCuota: '', valorCuota: '' });
          };

          const eliminarDelCatalogo = (id) => {
            if(window.confirm("¿Eliminar este servicio del catálogo?")) {
              const nuevoCat = catalogo.filter(c => c.id !== id);
              setCatalogo(nuevoCat); localStorage.setItem('celene_catalog', JSON.stringify(nuevoCat));
            }
          };

          const restaurarCatalogoDefault = () => {
            if(window.confirm("¿Restaurar catálogo original? Se recuperarán los 24 servicios base de Proyecto Celene.")) {
              setCatalogo(CATALOGO_DEFAULT); localStorage.setItem('celene_catalog', JSON.stringify(CATALOGO_DEFAULT));
            }
          };

          const handleExportarCSV = () => {
            if (history.length === 0) return alert("No hay datos.");
            let csv = "\uFEFFFolio,Fecha,Atendido Por,Nombre Paciente,Sexo,Edad,Domicilio,Telefono,Servicios(Detalle),Costo Privado(Suma),Cuota Base Celene,Subsidio Celene Otorgado,Total A Cobrar,Aporte Recibido,Adeudado,Forma de Pago,Comentarios\n";
            history.forEach(r => {
              const escape = (text) => `"${String(text || '').replace(/"/g, '""')}"`;
              const sText = r.servicios.map(s => s.nombre + (s.isSubsidized ? ' [SUB]' : '')).join(' + ');
              csv += `${r.folio},${escape(r.fecha)},${escape(r.doctor)},${escape(r.paciente.nombre)},${escape(r.paciente.sexo)},${escape(r.paciente.edad)},${escape(r.paciente.domicilio)},${escape(r.paciente.telefono)},${escape(sText)},${r.totales.comercial},${r.totales.cuotaBaseTotal},${r.totales.subsidioOtorgado},${r.totales.cuotaACobrar},${r.totales.aporte||''},${r.totales.adeudado||'0'},${escape(r.formaPago||'')},${escape(r.comentarios)}\n`;
            });
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));

                    )}
                    
                    <div className="relative mb-3">
                      <div className="absolute left-2 top-2 text-gray-400"><IcoSearch /></div>
                      <input type="text" placeholder="Buscar..." className="w-full p-1.5 pl-8 border border-gray-300 rounded outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                      {searchTerm && (
                        <div className="absolute z-10 w-full bg-white border shadow-lg max-h-48 overflow-y-auto mt-1 rounded">
                          {serviciosFiltrados.length > 0 ? serviciosFiltrados.map(s => (
                            <div key={s.id} onClick={() => handleAddServiceFromCatalog(s)} className="p-2 hover:bg-blue-50 cursor-pointer border-b flex justify-between text-xs">
                              <span className="font-semibold">{s.nombre}</span><span className="text-gray-500 numeros-claros">${s.valorCuota}</span>
                            </div>
                          )) : <div className="p-2 text-gray-500 text-center text-xs">Sin resultados</div>}
                        </div>
                      )}
                    </div>

                    {/* Lista de Seleccionados con Toggle "Subsidiar" */}
                    <div className="border rounded bg-white min-h-[60px] max-h-[150px] overflow-y-auto">
                      {serviciosSeleccionados.map(s => (
                        <div key={s.uid} className="flex justify-between items-center p-1.5 border-b text-xs">
                          <div className="w-3/5 pr-2"><p className="font-bold leading-tight" title={s.nombre}>{s.nombre}</p></div>
                          <div className="flex items-center gap-2">
                            <label className="flex items-center gap-1 text-[10px] text-gray-600 cursor-pointer hover:bg-gray-100 p-1 rounded">
                              <input type="checkbox" checked={s.isSubsidized} onChange={() => toggleSubsidized(s.uid)} className="accent-blue-600" />
                              Subsidiar
                            </label>
                            <span className={`font-bold numeros-claros w-8 text-right ${s.isSubsidized ? 'text-green-600 line-through text-[10px]' : 'text-blue-700'}`}>${s.valorCuota}</span>
                            <button onClick={() => handleRemoveService(s.uid)} className="text-red-500 hover:text-red-700 ml-1"><IcoTrash /></button>
                          </div>
                        </div>
                      ))}
                      {serviciosSeleccionados.length === 0 && <p className="text-center text-gray-400 text-xs py-3">Busca y selecciona servicios arriba</p>}
                    </div>
                  </section>

                  {/* Finanzas */}
                  <section className="bg-blue-50 p-3 rounded border border-blue-200">
                    <div className="flex justify-between items-center mb-2">
                        <span className="font-bold text-blue-900 text-xs uppercase">Total a Cobrar:</span>
                        <span className="font-black text-blue-900 text-lg numeros-claros">${totales.cuotaACobrar}</span>
                    </div>
                    <label className="block text-xs font-bold text-gray-700 mb-1">Total Recibido Hoy ($)</label>
                    <input type="number" className="w-full p-2 border rounded text-base font-bold text-center mb-2 numeros-claros" placeholder="Dejar blanco para caja [ ]" value={aporteSolidario} onChange={(e) => setAporteSolidario(e.target.value)} />
                    
                    <div className="flex justify-between items-center bg-white p-2 border rounded mb-2">
                        <span className="font-bold text-red-800 text-xs">Adeudado:</span>
                        <span className="font-bold text-red-800 numeros-claros">{totales.adeudado !== null ? `$${totales.adeudado}` : '---'}</span>
                    </div>

                    <div className="flex flex-wrap gap-1">
                      <button onClick={() => setFormaPago(formaPago === 'Efectivo' ? '' : 'Efectivo')} className={`flex-1 py-1 rounded border text-[10px] font-bold ${formaPago === 'Efectivo' ? 'bg-blue-800 text-white' : 'bg-white'}`}>Efectivo</button>
                      <button onClick={() => setFormaPago(formaPago === 'Tarjeta' ? '' : 'Tarjeta')} className={`flex-1 py-1 rounded border text-[10px] font-bold ${formaPago === 'Tarjeta' ? 'bg-blue-800 text-white' : 'bg-white'}`}>Tarjeta</button>
                      <button onClick={() => setFormaPago(formaPago === 'Transferencia' ? '' : 'Transferencia')} className={`flex-1 py-1 rounded border text-[10px] font-bold ${formaPago === 'Transferencia' ? 'bg-blue-800 text-white' : 'bg-white'}`}>Transferencia</button>
                    </div>
                  </section>
                  
                  <textarea className="w-full p-2 border rounded h-16 text-xs" placeholder="Comentarios internos..." value={comentarios} onChange={e => setComentarios(e.target.value)}></textarea>
                </div>

                <div className="bg-white p-3 border-t flex flex-col gap-2 sticky bottom-0 z-10 shadow-lg">
                  <button onClick={handleGuardarEImprimir} className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded flex justify-center items-center gap-2 text-lg shadow-md"><IcoPrinter /> Imprimir Recibo</button>
                  <button onClick={handleExportarCSV} className="w-full flex justify-center items-center gap-1 text-gray-600 border border-gray-300 py-1.5 rounded text-xs hover:bg-gray-100"><IcoDownload /> Descargar Excel ({history.length})</button>
                </div>

                {/* MODALES OCULTOS POR ESPACIO */}
                {showHistoryModal && (
                  <div className="absolute inset-0 bg-white z-30 flex flex-col">
                    <div className="bg-gray-800 text-white p-4 flex justify-between items-center"><h2 className="font-bold flex items-center gap-2"><IcoList/> Historial</h2><button onClick={() => setShowHistoryModal(false)}><IcoX/></button></div>
                    <div className="p-4 overflow-y-auto flex-1 bg-gray-50 text-sm">
                      {history.slice().reverse().map(r => (
                        <div key={r.folio} className="bg-white p-3 mb-3 rounded border shadow-sm">
                          <div className="flex justify-between font-bold text-blue-900 border-b pb-2 mb-2"><span>Folio #{r.folio}</span> <span>{r.fecha}</span></div>
                          <p><strong>Paciente:</strong> {r.paciente.nombre}</p>
                          <div className="flex gap-2 justify-end mt-2">
                            <button onClick={() => editarReciboViejo(r)} className="flex items-center gap-1 bg-blue-100 text-blue-700 px-3 py-1 rounded hover:bg-blue-200"><IcoEdit/> Editar</button>
                            <button onClick={() => eliminarRecibo(r.folio)} className="flex items-center gap-1 bg-red-100 text-red-700 px-3 py-1 rounded hover:bg-red-200"><IcoTrash/> Borrar</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {showCatalogModal && (
                  <div className="absolute inset-0 bg-white z-30 flex flex-col">
                    <div className="bg-gray-800 text-white p-4 flex justify-between items-center"><h2 className="font-bold flex items-center gap-2"><IcoSettings/> Catálogo</h2><button onClick={() => setShowCatalogModal(false)}><IcoX/></button></div>
                    <div className="p-4 overflow-y-auto flex-1 bg-gray-50">
                       <button onClick={restaurarCatalogoDefault} className="w-full text-xs text-blue-600 border border-blue-600 px-2 py-2 mb-4 rounded hover:bg-blue-50 font-bold">Restaurar Originales</button>
                       <form onSubmit={guardarNuevoServicioCatalogo} className="bg-white p-3 rounded border mb-4 text-xs">
                        <p className="font-bold mb-2">Agregar Servicio Permanente</p>
                        <input required name="nombre" placeholder="Nombre" className="w-full p-1.5 border rounded mb-2" value={nuevoServicioCat.nombre} onChange={e=>setNuevoServicioCat({...nuevoServicioCat, nombre: e.target.value})} />
                        <div className="flex gap-2 mb-2">
                            <input required type="number" placeholder="Costo Comercial ($)" className="w-1/2 p-1.5 border rounded" value={nuevoServicioCat.valorComercial} onChange={e=>setNuevoServicioCat({...nuevoServicioCat, valorComercial: e.target.value})} />
                            <input required type="number" placeholder="Cuota Celene ($)" className="w-1/2 p-1.5 border rounded" value={nuevoServicioCat.valorCuota} onChange={e=>setNuevoServicioCat({...nuevoServicioCat, valorCuota: e.target.value})} />
                        </div>
                        <button type="submit" className="w-full bg-blue-600 text-white py-1.5 rounded">Guardar</button>
                      </form>
                      <div className="space-y-2">
                        {catalogo.slice().reverse().map(c => (
                          <div key={c.id} className="bg-white p-2 rounded border flex justify-between items-center text-xs">
                            <p className="font-bold truncate w-4/5">{c.nombre} <span className="text-gray-500 font-normal">(${c.valorCuota})</span></p>
                            <button onClick={() => eliminarDelCatalogo(c.id)} className="text-red-500"><IcoTrash/></button>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* --- PANEL DERECHO: VISTA PREVIA E IMPRESIÓN VERTICAL --- */}
              <div className="w-2/3 flex-1 h-full bg-gray-500 p-8 overflow-y-auto print:w-full print:p-0 print:bg-white flex justify-center print:block">
                
                {/* Contenedor Flex Row: Controlado estrictamente para impresión */}
                <div className="w-[850px] max-w-full flex flex-row bg-white shadow-2xl print:shadow-none print:w-full h-auto min-h-[10.4in] print:min-h-0 print:h-auto overflow-hidden print:rounded-none hoja-impresion">
                  
                  {/* RECIBO 1: CLÍNICA (Izquierda) */}
                  <CopiaClinica />
                  
                  {/* LÍNEA DE CORTE CENTRAL */}
                  <div className="w-0 border-r-2 border-dashed border-gray-400 relative hidden md:block print:block print:border-gray-500">
                      <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white px-1 print:hidden text-[10px] text-gray-400 font-bold tracking-widest" style={{ writingMode: 'vertical-rl' }}>
                          LÍNEA DE CORTE
                      </div>
                  </div>

                  {/* RECIBO 2: PACIENTE (Derecha) */}
                  <CopiaPaciente />

                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
